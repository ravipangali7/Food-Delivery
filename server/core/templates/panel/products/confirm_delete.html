{% extends "panel/base.html" %}
{% block title %}Delete product{% endblock %}
{% block content %}
<div class="panel-topbar">
  <h1>Delete product</h1>
</div>
<div class="panel-card panel-form">
  <p>Remove <strong>{{ product.name }}</strong> from the catalog? It will be hidden from customers (soft delete).</p>
  <form method="post">
    {% csrf_token %}
    <div class="panel-actions">
      <button type="submit" class="btn btn-danger">Delete</button>
      <a class="btn btn-secondary" href="{% url 'panel_product_list' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
